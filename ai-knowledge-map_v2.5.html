<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Knowledge Map — Interactive Visual Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #070a0f;
  --bg-secondary: #0d1117;
  --bg-card: rgba(255,255,255,0.025);
  --border: rgba(255,255,255,0.06);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --ai: #00D4AA;
  --ml: #FF6B6B;
  --nn: #A78BFA;
  --nlp: #F59E0B;
  --genai: #EC4899;
  --llm: #06B6D4;
  --rag: #10B981;
  --mcp: #F97316;
  --a2a: #8B5CF6;
  --agent: #EF4444;
  --agentic: #D946EF;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 20;
}
.header-title {
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, #00D4AA, #06B6D4, #8B5CF6, #EC4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.header-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  letter-spacing: 0.3px;
}
.header-legend {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.legend-chip {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.3s;
  white-space: nowrap;
}
.legend-chip:hover { transform: scale(1.06); }
.legend-chip.active { border-color: currentColor; }

/* ── MAIN LAYOUT ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── DIAGRAM AREA ── */
.diagram-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
.diagram-area:active { cursor: grabbing; }

.diagram-canvas {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* background grid effect */
.diagram-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
}
.diagram-area::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, var(--bg-primary) 80%);
  pointer-events: none;
  z-index: 1;
}

/* ── SVG NODES ── */
.node-group { cursor: pointer; }
.node-group:hover .node-glow { opacity: 0.6; }
.node-group:hover .node-circle { transform: scale(1.12); }
.node-group.active .node-glow { opacity: 0.8; }
.node-group.active .node-ring { opacity: 1; stroke-dasharray: none; }
.node-circle {
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: center;
}
.node-glow {
  opacity: 0.3;
  transition: opacity 0.3s;
}
.node-ring {
  opacity: 0.5;
  transition: opacity 0.3s;
}
.connection-line {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
  fill: none;
  transition: stroke 0.3s, stroke-width 0.3s;
}
.connection-line.highlight {
  stroke-width: 1.8;
}

/* Node pulse animation */
@keyframes pulse-ring {
  0% { r: 32; opacity: 0.4; }
  100% { r: 46; opacity: 0; }
}
.pulse-anim {
  animation: pulse-ring 2s ease-out infinite;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  width: 420px;
  max-width: 45vw;
  background: linear-gradient(180deg, rgba(13,17,23,0.98) 0%, rgba(7,10,15,0.99) 100%);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 10;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.panel-close {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  justify-content: flex-end;
  padding: 12px 16px 0;
  background: linear-gradient(180deg, rgba(13,17,23,0.98) 0%, transparent 100%);
}
.close-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

.panel-content { padding: 4px 22px 28px; }

.panel-icon { font-size: 32px; margin-bottom: 8px; }
.panel-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 4px;
}
.panel-tagline {
  font-size: 13px;
  font-style: italic;
  color: var(--text-secondary);
  margin-bottom: 18px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.def-box {
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 18px;
  font-size: 13px;
  line-height: 1.75;
  color: #cbd5e1;
}

.key-point {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 8px;
}
.kp-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.kp-text {
  font-size: 12.5px;
  line-height: 1.65;
  color: #b0bec5;
}

.example-card {
  padding: 12px 14px;
  background: rgba(0,0,0,0.35);
  border-radius: 10px;
  margin-bottom: 8px;
  border-left: 3px solid;
}
.example-name {
  font-weight: 700;
  font-size: 12.5px;
  color: #f1f5f9;
  margin-bottom: 3px;
}
.example-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.relations-box {
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 12.5px;
  line-height: 1.7;
  margin-bottom: 12px;
}

.section-group { margin-bottom: 18px; }

/* ── HINT OVERLAY ── */
.hint-overlay {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 12px;
  color: var(--text-muted);
  pointer-events: none;
  transition: opacity 0.5s;
  backdrop-filter: blur(8px);
}
.hint-overlay.hidden { opacity: 0; }

/* ── FOOTER ── */
.footer {
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.5);
  text-align: center;
  flex-shrink: 0;
  z-index: 20;
}
.footer-brand {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: linear-gradient(90deg, #00D4AA, #06B6D4, #8B5CF6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.footer-name {
  font-size: 12.5px;
  color: #FFFFFF;
  font-weight: 700;
  margin-top: 2px;
  letter-spacing: 0.3px;
}

/* ── ANIMATIONS ── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-in { animation: fadeSlideIn 0.35s ease forwards; }
.anim-d1 { animation-delay: 0.05s; opacity: 0; }
.anim-d2 { animation-delay: 0.1s; opacity: 0; }
.anim-d3 { animation-delay: 0.15s; opacity: 0; }
.anim-d4 { animation-delay: 0.2s; opacity: 0; }
.anim-d5 { animation-delay: 0.25s; opacity: 0; }

/* Connection line drawing animation */
@keyframes drawLine {
  from { stroke-dashoffset: 1000; }
  to { stroke-dashoffset: 0; }
}
.line-draw {
  stroke-dasharray: 1000;
  animation: drawLine 2s ease forwards;
}

/* Node entrance */
@keyframes nodeAppear {
  from { opacity: 0; transform: scale(0); }
  to { opacity: 1; transform: scale(1); }
}

@media (max-width: 768px) {
  .detail-panel { width: 100vw; max-width: 100vw; position: absolute; right: 0; top: 0; bottom: 0; }
  .header-legend { display: none; }
  .header-title { font-size: 16px; }
}
</style>
</head>

// ══════════════════════════════════════════
//  NODE POSITIONS (responsive layout)
// ══════════════════════════════════════════
function getNodePositions(w, h) {
  const cx = w / 2, cy = h / 2;
  const sx = w / 1200, sy = h / 700;
  const s = Math.min(sx, sy, 1);
  return {
    ai:      { x: cx,             y: cy - 260*s },
    ml:      { x: cx - 260*s,     y: cy - 150*s },
    nn:      { x: cx - 380*s,     y: cy + 10*s },
    nlp:     { x: cx + 260*s,     y: cy - 150*s },
    genai:   { x: cx + 380*s,     y: cy + 10*s },
    llm:     { x: cx,             y: cy - 40*s },
    rag:     { x: cx - 180*s,     y: cy + 130*s },
    mcp:     { x: cx + 180*s,     y: cy + 130*s },
    a2a:     { x: cx + 320*s,     y: cy + 220*s },
    agent:   { x: cx - 100*s,     y: cy + 260*s },
    agentic: { x: cx + 100*s,     y: cy + 260*s }
  };
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
let activeNode = null;
let positions = {};

function render() {
  const svg = document.getElementById('canvas');
  const area = document.getElementById('diagramArea');
  const w = area.clientWidth;
  const h = area.clientHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  positions = getNodePositions(w, h);

  let html = '';

  // Connections
  const drawn = new Set();
  concepts.forEach(c => {
    c.connections.forEach(targetId => {
      const key = [c.id, targetId].sort().join('-');
      if (drawn.has(key)) return;
      drawn.add(key);
      const from = positions[c.id];
      const to = positions[targetId];
      if (!from || !to) return;

      const isHighlight = activeNode && (c.id === activeNode || targetId === activeNode);
      const targetConcept = concepts.find(x => x.id === targetId);
      const col = isHighlight
        ? (c.id === activeNode ? c.color : targetConcept.color)
        : 'rgba(255,255,255,0.06)';

      // Curved line
      const mx = (from.x + to.x) / 2;
      const my = (from.y + to.y) / 2;
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const curvature = 0.15;
      const cpx = mx - dy * curvature;
      const cpy = my + dx * curvature;

      html += `<path d="M${from.x},${from.y} Q${cpx},${cpy} ${to.x},${to.y}"
        class="connection-line ${isHighlight ? 'highlight' : ''} line-draw"
        stroke="${col}" style="${isHighlight ? 'opacity:0.5' : ''}"/>`;
    });
  });

  // Nodes
  const s = Math.min(w / 1200, h / 700, 1);
  const nodeR = Math.max(22, 28 * s);
  const fontSize = Math.max(9, 11 * s);

  concepts.forEach((c, i) => {
    const p = positions[c.id];
    if (!p) return;
    const isActive = activeNode === c.id;
    const delay = i * 0.06;

    html += `<g class="node-group ${isActive ? 'active' : ''}" onclick="selectNode('${c.id}')"
      style="animation: nodeAppear 0.5s ${delay}s ease both;">`;

    // Glow
    html += `<circle class="node-glow" cx="${p.x}" cy="${p.y}" r="${nodeR * 2.2}" fill="${c.color}" opacity="0.08" filter="url(#blur)"/>`;

    // Pulse ring (if active)
    if (isActive) {
      html += `<circle class="pulse-anim" cx="${p.x}" cy="${p.y}" r="${nodeR}" fill="none" stroke="${c.color}" stroke-width="1.5" opacity="0.4"/>`;
    }

    // Outer ring
    html += `<circle class="node-ring" cx="${p.x}" cy="${p.y}" r="${nodeR + 4}" fill="none"
      stroke="${c.color}" stroke-width="${isActive ? 2 : 1}" stroke-dasharray="${isActive ? 'none' : '3 4'}"
      opacity="${isActive ? 1 : 0.35}"/>`;

    // Main circle
    html += `<circle class="node-circle" cx="${p.x}" cy="${p.y}" r="${nodeR}"
      fill="${isActive ? c.color + '30' : 'rgba(13,17,23,0.9)'}"
      stroke="${c.color}" stroke-width="${isActive ? 2.5 : 1.5}"/>`;

    // Icon
    html += `<text x="${p.x}" y="${p.y + 1}" text-anchor="middle" dominant-baseline="central"
      font-size="${nodeR * 0.75}" style="pointer-events:none">${c.icon}</text>`;

    // Label
    html += `<text x="${p.x}" y="${p.y + nodeR + 16}" text-anchor="middle"
      font-family="'Outfit', sans-serif" font-size="${fontSize}" font-weight="700"
      fill="${isActive ? c.color : '#94a3b8'}" style="pointer-events:none">${c.label}</text>`;

    html += `</g>`;
  });

  // SVG defs
  const defs = `<defs>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>`;

  svg.innerHTML = defs + html;
}

// ══════════════════════════════════════════
//  INTERACTION
// ══════════════════════════════════════════
function selectNode(id) {
  activeNode = id;
  render();
  showPanel(id);
  document.getElementById('hint').classList.add('hidden');
  // Update legend chips
  document.querySelectorAll('.legend-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

function closePanel() {
  activeNode = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.legend-chip').forEach(el => el.classList.remove('active'));
  setTimeout(render, 50);
}

function showPanel(id) {
  const c = concepts.find(x => x.id === id);
  if (!c) return;

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('panelContent');

  const kpHTML = c.keyPoints.map((p, i) => `
    <div class="key-point anim-in anim-d${Math.min(i+1, 5)}">
      <div class="kp-num" style="background:${c.color}22; color:${c.color}">${i + 1}</div>
      <div class="kp-text">${p}</div>
    </div>
  `).join('');

  const exHTML = c.examples.map((e, i) => `
    <div class="example-card anim-in anim-d${Math.min(i+2, 5)}" style="border-left-color:${c.color}">
      <div class="example-name">${e.name}</div>
      <div class="example-desc">${e.desc}</div>
    </div>
  `).join('');

  // Nav arrows
  const idx = concepts.findIndex(x => x.id === id);
  const prev = idx > 0 ? concepts[idx - 1] : null;
  const next = idx < concepts.length - 1 ? concepts[idx + 1] : null;

  content.innerHTML = `
    <div class="panel-icon anim-in">${c.icon}</div>
    <div class="panel-title anim-in anim-d1" style="color:${c.color}">${c.title}</div>
    <div class="panel-tagline anim-in anim-d2">${c.tagline}</div>

    <div class="section-group anim-in anim-d2">
      <div class="section-label" style="color:${c.color}">Definition</div>
      <div class="def-box" style="background:${c.color}0a; border:1px solid ${c.color}20">${c.definition}</div>
    </div>

    <div class="section-group anim-in anim-d3">
      <div class="section-label" style="color:var(--text-secondary)">⚙️ Key Technical Points</div>
      ${kpHTML}
    </div>

    <div class="section-group anim-in anim-d4">
      <div class="section-label" style="color:var(--text-secondary)">🌍 Real-World Examples</div>
      ${exHTML}
    </div>

    <div class="section-group anim-in anim-d5">
      <div class="section-label" style="color:#a78bfa">🔗 How It Connects</div>
      <div class="relations-box" style="background:rgba(139,92,246,0.07); border:1px solid rgba(139,92,246,0.15); color:#c4b5fd">${c.relationships}</div>
    </div>

    <div style="display:flex; justify-content:space-between; margin-top:8px;">
      ${prev ? `<button onclick="selectNode('${prev.id}')" style="padding:7px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; color:#94a3b8; cursor:pointer; font-size:11px; font-weight:600; font-family:'DM Sans',sans-serif">← ${prev.icon} ${prev.label}</button>` : '<div></div>'}
      ${next ? `<button onclick="selectNode('${next.id}')" style="padding:7px 14px; background:${next.color}15; border:1px solid ${next.color}30; border-radius:8px; color:${next.color}; cursor:pointer; font-size:11px; font-weight:600; font-family:'DM Sans',sans-serif">${next.icon} ${next.label} →</button>` : '<div></div>'}
    </div>
  `;

  panel.classList.add('open');
  panel.scrollTop = 0;
}

// ══════════════════════════════════════════
//  LEGEND CHIPS
// ══════════════════════════════════════════
function renderLegend() {
  const container = document.getElementById('legendChips');
  container.innerHTML = concepts.map(c => `
    <div class="legend-chip" data-id="${c.id}"
      style="background:${c.color}12; color:${c.color}"
      onclick="selectNode('${c.id}')">
      ${c.icon} ${c.label}
    </div>
  `).join('');
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener('resize', render);
renderLegend();
render();

// Hide hint after first click
document.getElementById('diagramArea').addEventListener('click', () => {
  document.getElementById('hint').classList.add('hidden');
}, { once: true });
</script>
