<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security Stack — Architect U'r Career</title>

<!-- FIX #10: Open Graph meta tags for social sharing -->
<meta property="og:title" content="AI Security Stack — Layered Defense for AI Systems">
<meta property="og:description" content="Interactive visual guide to the 6 critical layers of AI security: Infrastructure, Data, Model, Pipeline, Prompt, and API security. By Krishna Mohan Parsha.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AI Security Stack — Layered Defense for AI Systems">
<meta name="twitter:description" content="Interactive visual guide to the 6 critical layers of AI security. Architect U'r Career | Krishna Mohan Parsha">
<meta name="description" content="Interactive visual guide to the 6 critical layers of AI security: Infrastructure, Data, Model, Pipeline, Prompt, and API security.">
<meta name="author" content="Krishna Mohan Parsha">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #080a1c;
    --bg-mid: #0e1230;
    --cyan: #00e6ff;
    --cyan-dim: rgba(0, 230, 255, 0.25);
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 40%, #121838 100%);
    color: #fff;
    font-family: 'Outfit', system-ui, sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,230,255,0.007) 3px, rgba(0,230,255,0.007) 4px);
  }

  .corner { position: fixed; width: 22px; height: 22px; z-index: 2; }
  .corner.tl { top: 10px; left: 10px; border-top: 2px solid var(--cyan-dim); border-left: 2px solid var(--cyan-dim); }
  .corner.tr { top: 10px; right: 10px; border-top: 2px solid var(--cyan-dim); border-right: 2px solid var(--cyan-dim); }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--cyan-dim); border-left: 2px solid var(--cyan-dim); }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--cyan-dim); border-right: 2px solid var(--cyan-dim); }

  .container {
    position: relative; z-index: 3;
    max-width: 740px; margin: 0 auto;
    padding: 44px 20px 28px;
  }

  /* ── Title ── */
  .header {
    text-align: center; margin-bottom: 40px;
    opacity: 0; transform: translateY(-22px);
    animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.2s forwards;
  }
  .header .title-row {
    display: inline-flex; align-items: center; gap: 14px; justify-content: center;
  }
  /* FIX #13: Shield icon beside title */
  .header .shield-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    color: var(--cyan); opacity: 0.7;
  }
  .header h1 {
    font-size: clamp(28px, 5vw, 40px); font-weight: 800;
    letter-spacing: 3px;
    /* FIX #3: standard background-clip + webkit prefix */
    background: linear-gradient(135deg, #fff 30%, var(--cyan) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; color: transparent;
  }
  .header .subtitle {
    margin-top: 8px; font-size: 14px; font-weight: 300;
    color: rgba(0,210,240,0.55); letter-spacing: 4px;
  }
  .header .divider {
    width: 200px; height: 1px; margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, rgba(0,230,255,0.4), transparent);
  }

  .stack { display: flex; flex-direction: column; gap: 8px; }

  /* ── Layer Card ── */
  .layer-card {
    margin: 0 auto; border-radius: 12px; overflow: hidden; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    transition: all 0.35s ease;
    position: relative;
    opacity: 0; transform: translateY(40px);
  }
  .layer-card.visible { opacity: 1; transform: translateY(0); }
  /* FIX #5: rgba() fallback instead of color-mix() */
  .layer-card:hover {
    border-color: var(--layer-color);
    box-shadow: 0 0 30px rgba(var(--lr), var(--lg), var(--lb), 0.12);
  }
  .layer-card.expanded {
    border-color: var(--layer-color);
    background: linear-gradient(135deg, rgba(var(--lr), var(--lg), var(--lb), 0.08), transparent);
    box-shadow: 0 0 35px rgba(var(--lr), var(--lg), var(--lb), 0.15);
  }

  .layer-card .accent-bar {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--layer-gradient);
    box-shadow: 0 0 14px rgba(var(--lr), var(--lg), var(--lb), 0.5);
  }

  .layer-row {
    display: flex; align-items: center; padding: 16px 20px 16px 24px; gap: 16px;
  }
  .layer-icon {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(var(--lr), var(--lg), var(--lb), 0.1);
    border: 1px solid rgba(var(--lr), var(--lg), var(--lb), 0.28);
    color: var(--layer-color);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .layer-card:hover .layer-icon {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(var(--lr), var(--lg), var(--lb), 0.25);
  }
  .layer-icon svg { width: 22px; height: 22px; }

  .layer-info { flex: 1; min-width: 0; }
  .layer-num {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
    color: var(--layer-color); opacity: 0.65; letter-spacing: 1.5px;
  }
  .layer-name { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; margin-top: 1px; }
  .layer-tagline { font-size: 13px; color: rgba(180,195,220,0.65); margin-top: 2px; }

  .chevron {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    transition: all 0.35s ease;
  }
  .layer-card.expanded .chevron {
    transform: rotate(180deg);
    background: rgba(var(--lr), var(--lg), var(--lb), 0.15);
  }
  .chevron svg { stroke: rgba(255,255,255,0.35); }
  .layer-card.expanded .chevron svg { stroke: var(--layer-color); }

  .layer-details {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(.16,1,.3,1);
  }
  /* FIX #8: larger max-height for accessibility zoom */
  .layer-card.expanded .layer-details { max-height: 600px; }

  .details-inner {
    padding: 0 24px 20px;
    border-top: 1px solid rgba(var(--lr), var(--lg), var(--lb), 0.08);
  }
  .details-inner > div { padding-top: 16px; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    letter-spacing: 1.8px; margin-bottom: 10px;
  }
  .section-label.controls { color: var(--layer-color); }
  .section-label.threat { color: #ff6b6b; }
  .section-label.frameworks { color: #00c8ff; }

  .point-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
  .point {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: rgba(200,210,225,0.85); line-height: 1.55;
  }
  .point-dot {
    width: 5px; height: 5px; border-radius: 50%; margin-top: 7px; flex-shrink: 0;
    background: var(--layer-color);
    box-shadow: 0 0 6px rgba(var(--lr), var(--lg), var(--lb), 0.5);
  }

  .info-box { border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  .info-box.threat-box {
    background: rgba(255,50,50,0.06);
    border: 1px solid rgba(255,80,80,0.14);
  }
  .info-box.threat-box p { font-size: 12px; color: rgba(255,180,180,0.75); line-height: 1.55; }
  .info-box.fw-box {
    background: rgba(0,200,255,0.04);
    border: 1px solid rgba(0,200,255,0.1);
  }
  .info-box.fw-box p { font-size: 12px; color: rgba(150,220,255,0.7); }

  .hint {
    text-align: center; margin-top: 22px;
    font-size: 12px; color: rgba(0,200,230,0.4); letter-spacing: 1px;
    opacity: 0; animation: fadeIn 1s ease 1.4s forwards;
  }

  .footer {
    margin-top: 34px; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .footer .brand {
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    /* FIX #3: standard background-clip */
    background: linear-gradient(90deg, #00d2f0, #00e6ff, #40a0ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; color: transparent;
  }
  /* FIX #14: Source attribution */
  .footer .attribution {
    margin-top: 8px; font-size: 10px;
    color: rgba(120, 150, 180, 0.35);
    letter-spacing: 0.5px;
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity: 1; } }

  /* FIX #11: prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    #particles { display: none; }
    .scanlines { display: none; }
    .layer-card { opacity: 1 !important; transform: none !important; }
    .header { opacity: 1 !important; transform: none !important; }
    .hint { opacity: 0.4 !important; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="scanlines"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
  <div class="header">
    <!-- FIX #13: Shield icon beside title -->
    <div class="title-row">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
      <h1>AI SECURITY STACK</h1>
    </div>
    <div class="subtitle">LAYERED DEFENSE FOR AI SYSTEMS</div>
    <div class="divider"></div>
  </div>

  <div class="stack" id="stack"></div>

  <div class="hint">Click any layer to explore details</div>

  <div class="footer">
    <p class="brand">Architect U'r Career &nbsp;|&nbsp; Krishna Mohan Parsha</p>
    <!-- FIX #14: Source attribution for credibility -->
    <p class="attribution">Based on NIST AI RMF &middot; MITRE ATLAS &middot; OWASP LLM Top 10 &middot; ISO 27001</p>
  </div>
</div>

<script>
const LAYERS = [
  {
    id:6, name:"API Security", tagline:"Control the Gateway",
    color:"#E6783C", rgb:"230,120,60",
    gradient:"linear-gradient(135deg,#c45e28,#E6783C,#ff9a5c)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><line x1="6" y1="9" x2="12" y2="15"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="6" y1="6" x2="18" y2="6"/></svg>`,
    points:["OAuth 2.0 / API key authentication & rotation","Rate limiting & token-based throttling","Endpoint monitoring & anomaly detection","Input/output filtering & content moderation","API versioning & deprecation governance"],
    threat:"Credential stuffing, DDoS on inference endpoints, data scraping, unauthorized model access",
    frameworks:"OWASP API Security Top 10, PCI DSS"
  },
  {
    id:5, name:"Prompt Security", tagline:"Defend the Input",
    color:"#C850A0", rgb:"200,80,160",
    gradient:"linear-gradient(135deg,#a33d82,#C850A0,#e870c0)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h8M8 14h4"/></svg>`,
    points:["Prompt injection detection & prevention","Jailbreak attempt classification & blocking","Input sanitization & validation layers","Context boundary enforcement for RAG","System prompt protection & instruction hierarchy"],
    threat:"Direct/indirect prompt injection, data exfiltration via prompt, jailbreaking, context manipulation",
    frameworks:"OWASP LLM Top 10, NIST AI 600-1"
  },
  {
    id:4, name:"Pipeline Security", tagline:"Secure the Workflow",
    color:"#8C5ADC", rgb:"140,90,220",
    gradient:"linear-gradient(135deg,#6b3fb5,#8C5ADC,#a87aff)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>`,
    points:["CI/CD pipeline integrity & signed artifacts","ML supply chain verification (SBOM for models)","Training environment sandboxing","Experiment tracking with tamper-proof audit trails","Automated security scanning in MLOps"],
    threat:"Dependency confusion, malicious packages in model registries, compromised training jobs",
    frameworks:"SLSA, SSDF, NIST SP 800-218"
  },
  {
    id:3, name:"Model Security", tagline:"Guard the Brain",
    color:"#5078E6", rgb:"80,120,230",
    gradient:"linear-gradient(135deg,#3a5abf,#5078E6,#6b95ff)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18"/><path d="M3 12h18"/><circle cx="12" cy="12" r="3"/></svg>`,
    points:["Adversarial robustness testing & red teaming","Model theft & extraction prevention","Weight poisoning & backdoor detection","Model watermarking & fingerprinting","Secure model serialization & integrity verification"],
    threat:"Adversarial examples, model inversion, trojaned weights, intellectual property theft",
    frameworks:"MITRE ATLAS, OWASP ML Top 10, NIST AI 100-2"
  },
  {
    id:2, name:"Data Security", tagline:"Protect What Fuels AI",
    color:"#1EAA9E", rgb:"30,170,158",
    gradient:"linear-gradient(135deg,#147a72,#1EAA9E,#28d4c6)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>`,
    points:["Training data encryption at rest & in transit","Differential privacy & data anonymization","Data lineage tracking & access governance","PII detection & automated redaction","Vector database access control & audit logs"],
    threat:"Data poisoning, membership inference attacks, PII leakage from embeddings",
    frameworks:"GDPR, CCPA, ISO 27001, NIST AI RMF"
  },
  {
    id:1, name:"Infrastructure Security", tagline:"The Foundation Layer",
    color:"#1482C8", rgb:"20,130,200",
    gradient:"linear-gradient(135deg,#0d5a8f,#1482C8,#18a0e8)",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="17" width="20" height="5" rx="1"/><rect x="4" y="10" width="16" height="5" rx="1"/><rect x="6" y="3" width="12" height="5" rx="1"/></svg>`,
    points:["Cloud environment hardening & network segmentation","GPU & compute node isolation and telemetry","Hardware root-of-trust & secure enclaves","Zero-trust architecture for AI workloads","Container security & Kubernetes RBAC"],
    threat:"Lateral movement through shared GPU clusters, supply chain attacks on hardware",
    frameworks:"NIST CSF, CIS Benchmarks, SOC 2"
  }
];

// ── Render Stack ──  (FIX #6: removed dead expandedId variable)
const stack = document.getElementById('stack');

LAYERS.forEach((layer, idx) => {
  const widthPct = 100 - idx * 3;
  // FIX #5: pass rgb components as CSS custom properties
  const [lr, lg, lb] = layer.rgb.split(',');
  const card = document.createElement('div');
  card.className = 'layer-card';
  card.style.cssText = `width:${widthPct}%;--layer-color:${layer.color};--layer-gradient:${layer.gradient};--lr:${lr};--lg:${lg};--lb:${lb};transition-delay:${idx * 0.12}s;`;
  card.dataset.id = layer.id;

  card.innerHTML = `
    <div class="accent-bar"></div>
    <div class="layer-row">
      <div class="layer-icon">${layer.icon}</div>
      <div class="layer-info">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="layer-num">0${layer.id}</span>
          <span class="layer-name">${layer.name}</span>
        </div>
        <div class="layer-tagline">${layer.tagline}</div>
      </div>
      <div class="chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="layer-details">
      <div class="details-inner"><div>
        <div class="section-label controls">KEY SECURITY CONTROLS</div>
        <div class="point-list">
          ${layer.points.map(p => `<div class="point"><div class="point-dot"></div><span>${p}</span></div>`).join('')}
        </div>
        <div class="info-box threat-box">
          <div class="section-label threat">THREAT LANDSCAPE</div>
          <p>${layer.threat}</p>
        </div>
        <div class="info-box fw-box">
          <div class="section-label frameworks">REFERENCE FRAMEWORKS</div>
          <p>${layer.frameworks}</p>
        </div>
      </div></div>
    </div>
  `;

  card.addEventListener('click', () => {
    const wasExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.layer-card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!wasExpanded) card.classList.add('expanded');
  });

  stack.appendChild(card);
  setTimeout(() => card.classList.add('visible'), 300 + idx * 120);
});

// ── Particle System ──
(function () {
  // FIX #11: skip particles entirely if reduced motion preferred
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, animId;
  const particles = [];
  const N = 45;
  let isVisible = true;

  // FIX #12: pause when tab is hidden
  document.addEventListener('visibilitychange', () => {
    isVisible = !document.hidden;
    if (isVisible && !animId) draw();
  });

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * (w || 1000), y: Math.random() * (h || 800),
      vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.3 + 0.08
    });
  }

  function draw() {
    if (!isVisible) { animId = null; return; } // FIX #12
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,230,255,${p.a})`;
      ctx.fill();
    }
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 110) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0,200,255,${0.05 * (1 - d / 110)})`;
          ctx.stroke();
        }
      }
    }
    animId = requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
